<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Admin - Monitoring System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="animate-fade" style="animation-delay: 0.1s;">
        <div class="logo">Smart<span>Complaint</span> Admin</div>
        <div class="nav-links"><a href="javascript:logout()">Logout</a></div>
    </nav>

    <div class="container animate-fade" style="animation-delay: 0.2s;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
            <div>
                <h2 class="gradient-text" style="font-size: 2.25rem;">Command Center</h2>
                <p style="color: var(--text-secondary);">Real-time monitoring of all active incidents and citizen reports.</p>
            </div>
            <div id="stats">
                <div class="glass-card" style="padding: 1rem 2rem; text-align: center;">
                    <small style="color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem;">Total Pulse</small>
                    <div id="totalCount" style="font-size: 2rem; font-weight: 800; color: var(--primary);">--</div>
                </div>
            </div>
        </div>

        <div id="policeSection" class="category-section animate-fade" style="display: none; margin-bottom: 3rem;">
            <h3 class="category-title" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                <span style="background: var(--primary); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 1rem;">🛡️</span> 
                Police Incidents
            </h3>
            <div id="policeComplaints" class="dashboard-grid"></div>
        </div>

        <div id="municipalSection" class="category-section animate-fade" style="display: none; margin-bottom: 3rem; animation-delay: 0.1s;">
            <h3 class="category-title" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                <span style="background: var(--secondary); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 1rem;">🏘️</span> 
                Municipal Issues
            </h3>
            <div id="municipalComplaints" class="dashboard-grid"></div>
        </div>

        <div id="medicalSection" class="category-section animate-fade" style="display: none; margin-bottom: 3rem; animation-delay: 0.2s;">
            <h3 class="category-title" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                <span style="background: var(--error); color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 1rem;">🚑</span> 
                Medical Emergencies
            </h3>
            <div id="medicalComplaints" class="dashboard-grid"></div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        loadAdminComplaints();
        
        async function updateStats() {
            try {
                const response = await fetch(API_BASE + '/api/admin/complaints');
                const data = await response.json();
                document.getElementById('totalCount').innerText = data.complaints.length;
            } catch (err) {
                console.error("Pulse error:", err);
            }
        }
        updateStats();
    </script>
</body>
</html>
